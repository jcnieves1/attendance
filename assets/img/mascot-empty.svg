<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pal the frog holding a blank notebook, encouraging you to get started">
  <ellipse cx="100" cy="188" rx="55" ry="9" fill="#000" opacity="0.08"/>

  <!-- legs -->
  <ellipse cx="72" cy="173" rx="18" ry="16" fill="#74c476" stroke="#4c9a49" stroke-width="2"/>
  <ellipse cx="128" cy="173" rx="18" ry="16" fill="#74c476" stroke="#4c9a49" stroke-width="2"/>

  <!-- webbed feet -->
  <path d="M54 181 Q72 203 90 181 Q72 191 54 181 Z" fill="#4c9a49"/>
  <path d="M110 181 Q128 203 146 181 Q128 191 110 181 Z" fill="#4c9a49"/>

  <!-- body -->
  <ellipse cx="100" cy="133" rx="50" ry="46" fill="#74c476" stroke="#4c9a49" stroke-width="2"/>
  <ellipse cx="100" cy="151" rx="30" ry="26" fill="#f5f9e8"/>

  <!-- both arms cradling the notebook -->
  <path d="M60 120 C 52 132, 56 146, 74 152" stroke="#4c9a49" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M60 120 C 52 132, 56 146, 74 152" stroke="#74c476" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M140 120 C 148 132, 144 146, 126 152" stroke="#4c9a49" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M140 120 C 148 132, 144 146, 126 152" stroke="#74c476" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- notebook, blank pages -->
  <rect x="70" y="120" width="60" height="46" rx="5" fill="#6c5ce7" stroke="#5647c9" stroke-width="2"/>
  <rect x="76" y="126" width="48" height="34" rx="3" fill="#ffffff"/>
  <circle cx="70" cy="126" r="2" fill="#5647c9"/>
  <circle cx="70" cy="134" r="2" fill="#5647c9"/>
  <circle cx="70" cy="142" r="2" fill="#5647c9"/>
  <circle cx="70" cy="150" r="2" fill="#5647c9"/>
  <circle cx="70" cy="158" r="2" fill="#5647c9"/>
  <line x1="82" y1="134" x2="118" y2="134" stroke="#e2e2f5" stroke-width="2"/>
  <line x1="82" y1="142" x2="118" y2="142" stroke="#e2e2f5" stroke-width="2"/>
  <line x1="82" y1="150" x2="118" y2="150" stroke="#e2e2f5" stroke-width="2"/>

  <!-- head -->
  <ellipse cx="100" cy="87" rx="40" ry="34" fill="#74c476" stroke="#4c9a49" stroke-width="2"/>

  <!-- eye mounds -->
  <circle cx="72" cy="63" r="20" fill="#74c476" stroke="#4c9a49" stroke-width="2"/>
  <circle cx="128" cy="63" r="20" fill="#74c476" stroke="#4c9a49" stroke-width="2"/>

  <!-- sclera + pupils, looking down at the empty page -->
  <circle cx="72" cy="61" r="13" fill="#ffffff"/>
  <circle cx="128" cy="61" r="13" fill="#ffffff"/>
  <circle cx="74" cy="65" r="7" fill="#2d2a35"/>
  <circle cx="126" cy="65" r="7" fill="#2d2a35"/>
  <circle cx="70.5" cy="61" r="2.2" fill="#fff"/>
  <circle cx="124.5" cy="61" r="2.2" fill="#fff"/>

  <!-- blush -->
  <ellipse cx="66" cy="97" rx="7" ry="4.5" fill="#ff9eb0" opacity="0.65"/>
  <ellipse cx="134" cy="97" rx="7" ry="4.5" fill="#ff9eb0" opacity="0.65"/>

  <!-- nostrils -->
  <circle cx="94" cy="89" r="1.3" fill="#4c9a49"/>
  <circle cx="106" cy="89" r="1.3" fill="#4c9a49"/>

  <!-- small, patient smile -->
  <path d="M72 101 Q100 112 128 101" stroke="#3d7a3b" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
